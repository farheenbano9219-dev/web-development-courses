<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Search Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Live Search Filter</h1>

    <input type="text" id="searchInput" placeholder="Search items...">

    <ul id="itemList">
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Orange</li>
        <li>Grapes</li>
        <li>Pineapple</li>
        <li>Watermelon</li>
    </ul>

    <p id="noResult" style="display:none;">No results found</p>
</div>

<script src="script.js"></script>
</body>
</html>
